name: Daily Contracts

# Publishes active-player contracts (OverTheCap via nflverse) to Supabase.
# - Manual: run anytime from the Actions tab.
# - Scheduled: daily at 11:00 UTC. Runs year-round — contracts change in free
#   agency / the draft, not just in-season. The job is light (~1-2 min) and the
#   upsert is idempotent, so a run with no upstream changes is a harmless no-op.
on:
  workflow_dispatch:
  schedule:
    - cron: "0 11 * * *"

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: python/requirements.txt

      - run: pip install -r requirements.txt

      - name: Publish contracts
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python -m projections publish-contracts
