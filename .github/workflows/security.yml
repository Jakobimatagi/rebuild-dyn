name: security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '0 13 * * 1'

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install with strict lockfile and no install scripts
        run: npm ci --ignore-scripts
      # Gate on vulnerabilities in code that actually ships (production deps).
      # Build-tooling advisories (esbuild/vite) are tracked separately — their
      # only upstream fix is a major vite bump and they never reach the runtime.
      - name: Fail on high/critical vulnerabilities (production deps)
        run: npm audit --audit-level=high --omit=dev
